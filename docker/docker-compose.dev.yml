services:
  # Backend API (Development)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: budget_backend_dev
    ports:
      - "3001:3001"
      - "9229:9229"  # Node.js debugger
    volumes:
      - ../backend:/app
      - /app/node_modules  # Prevent overwriting node_modules
      - ../secrets/development:/app/secrets:ro
      - ../docs:/docs:ro
      - backend_data:/app/data  # SQLite database file (used when DB_CLIENT=sqlite3)
    env_file:
      - ../secrets/development/.env
    environment:
      - NODE_ENV=development
      - DEBUG=budget:*
      # DB_CLIENT defaults to sqlite3 — override to mariadb or postgres profiles
      # - DB_CLIENT=mysql2
      # - DB_HOST=mariadb
      # - DB_PORT=3306
    networks:
      - budget_dev
    command: npm run dev
    restart: unless-stopped

  # Frontend (Development)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: budget_frontend_dev
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001/api/v1
      - CHOKIDAR_USEPOLLING=true
    networks:
      - budget_dev
    command: npm run dev
    restart: unless-stopped

  # MariaDB (Development) — start with: docker compose --profile mariadb up -d
  mariadb:
    profiles: [mariadb]
    image: mariadb:11.2
    container_name: budget_mariadb_dev
    ports:
      - "3306:3306"
    volumes:
      - mariadb_dev_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=dev_root_pass
      - MYSQL_DATABASE=budget_app
      - MYSQL_USER=budget_user
      - MYSQL_PASSWORD=dev_pass
      - TZ=America/New_York
    networks:
      - budget_dev
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # PostgreSQL (Development) — start with: docker compose --profile postgres up -d
  postgres:
    profiles: [postgres]
    image: postgres:16-alpine
    container_name: budget_postgres_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=budget_app
      - POSTGRES_USER=budget_user
      - POSTGRES_PASSWORD=dev_pass
    networks:
      - budget_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

networks:
  budget_dev:
    driver: bridge
    name: budget_dev_network

volumes:
  backend_data:
    name: budget_sqlite_dev_data
  mariadb_dev_data:
    name: budget_mariadb_dev_data
  postgres_dev_data:
    name: budget_postgres_dev_data
